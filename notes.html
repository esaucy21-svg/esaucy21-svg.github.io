---
layout: default
title: My Notes
permalink: /notes/
---

<style>
.dash-hero { text-align:center; padding:24px 0 32px; border-bottom:1px solid #2a2a4a; margin-bottom:28px; }
.dash-hero h2 { font-size:1.6rem; color:#a78bfa; margin-bottom:6px; }
.dash-hero p { color:#9090b0; font-size:0.9rem; }
.count-badge { display:inline-block; font-size:0.75rem; padding:3px 10px; border-radius:20px; font-weight:600; background:#2d2060; color:#a78bfa; margin-left:8px; vertical-align:middle; }
.add-form { background:#111125; border:1px solid #2a2a4a; border-radius:10px; padding:20px; margin-bottom:28px; }
.add-form h3 { font-size:0.95rem; color:#a78bfa; margin-bottom:14px; font-weight:700; }
.add-form input[type="text"], .add-form textarea { width:100%; background:#0f0f1e; border:1px solid #2a2a4a; border-radius:6px; color:#e0e0f0; font-family:inherit; font-size:0.88rem; padding:10px 12px; margin-bottom:10px; outline:none; transition:border-color 0.2s; resize:vertical; }
.add-form input:focus, .add-form textarea:focus { border-color:#a78bfa; }
.upload-section { border:2px dashed #2a2a4a; border-radius:8px; padding:16px; text-align:center; margin-bottom:10px; cursor:pointer; transition:border-color 0.2s,background 0.2s; }
.upload-section:hover { border-color:#a78bfa; background:#16162a; }
.upload-section input[type="file"] { display:none; }
.upload-label { cursor:pointer; color:#9090b0; font-size:0.85rem; display:block; }
.upload-label span { color:#a78bfa; font-weight:600; }
.upload-label .ui { font-size:1.5rem; display:block; margin-bottom:6px; }
.file-preview { font-size:0.8rem; color:#a78bfa; margin-top:6px; display:none; }
.btn-row { display:flex; gap:10px; flex-wrap:wrap; }
.btn-add-note { background:#7c3aed; color:#fff; border:none; border-radius:6px; padding:10px 20px; font-size:0.88rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
.btn-add-note:hover { opacity:0.85; }
.btn-upload-note { background:#2d2060; color:#a78bfa; border:1px solid #a78bfa; border-radius:6px; padding:10px 20px; font-size:0.88rem; font-weight:600; cursor:pointer; }
.btn-upload-note:hover { background:#3d2880; }
.search-bar { width:100%; background:#111125; border:1px solid #2a2a4a; border-radius:6px; color:#e0e0f0; font-family:inherit; font-size:0.88rem; padding:10px 14px; outline:none; margin-bottom:20px; transition:border-color 0.2s; }
.search-bar:focus { border-color:#a78bfa; }
.notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.note-card { background:#16162a; border:1px solid #2a2a4a; border-radius:10px; padding:16px; transition:border-color 0.2s,transform 0.15s; position:relative; }
.note-card:hover { border-color:#a78bfa; transform:translateY(-2px); }
.note-title { font-size:0.95rem; font-weight:700; color:#e0e0f0; margin-bottom:8px; padding-right:100px; }
.note-body { font-size:0.82rem; color:#9090b0; line-height:1.55; white-space:pre-wrap; word-break:break-word; max-height:120px; overflow:hidden; }
.note-body.expanded { max-height:none; }
.note-date { font-size:0.72rem; color:#555575; margin-top:10px; }
.note-source { font-size:0.7rem; color:#7c3aed; margin-top:2px; }
.note-actions { position:absolute; top:12px; right:12px; display:flex; gap:4px; }
.btn-icon { background:none; border:1px solid #2a2a4a; border-radius:4px; color:#888; cursor:pointer; font-size:0.75rem; padding:3px 6px; transition:all 0.15s; }
.btn-icon.del:hover { border-color:#ff6b6b; color:#ff6b6b; }
.btn-icon.edt:hover { border-color:#a78bfa; color:#a78bfa; }
.btn-icon.exp:hover { border-color:#38bdf8; color:#38bdf8; }
.empty-state { text-align:center; color:#555580; font-size:0.85rem; padding:60px 20px; grid-column:1/-1; }
.empty-state .ei { font-size:2.5rem; margin-bottom:10px; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal { background:#16162a; border:1px solid #2a2a4a; border-radius:12px; padding:24px; width:90%; max-width:520px; }
.modal h3 { color:#a78bfa; margin-bottom:16px; }
.modal input, .modal textarea { width:100%; background:#0f0f1e; border:1px solid #2a2a4a; border-radius:6px; color:#e0e0f0; font-family:inherit; font-size:0.88rem; padding:10px 12px; margin-bottom:10px; outline:none; resize:vertical; }
.modal input:focus, .modal textarea:focus { border-color:#a78bfa; }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
.btn-save { background:#7c3aed; color:#fff; border:none; border-radius:6px; padding:8px 18px; cursor:pointer; font-weight:600; }
.btn-cancel { background:#2a2a4a; color:#aaa; border:none; border-radius:6px; padding:8px 18px; cursor:pointer; }
</style>

<div class="dash-hero">
  <h2>🗒️ My Notes <span class="count-badge" id="notes-count">0</span></h2>
  <p>Write notes directly or upload a file from your computer</p>
</div>

<div class="add-form">
  <h3>➕ Add a New Note</h3>
  <input type="text" id="note-title" placeholder="Note title...">
  <textarea id="note-body" rows="4" placeholder="Write your note content here..."></textarea>
  <div class="upload-section" onclick="document.getElementById('note-file').click()">
    <input type="file" id="note-file" accept=".txt,.md" onchange="previewFile()">
    <label class="upload-label">
      <span class="ui">📁</span>
      <span>Click to upload a file from your desktop</span><br>
      Supports .txt and .md files
    </label>
    <div class="file-preview" id="note-file-name"></div>
  </div>
  <div class="btn-row">
    <button class="btn-add-note" onclick="addNote()">+ Add Note</button>
    <button class="btn-upload-note" onclick="importNote()">📤 Import from File</button>
  </div>
</div>

<input type="text" class="search-bar" id="search-notes" placeholder="🔍 Search notes..." oninput="renderNotes()">

<div class="notes-grid" id="notes-grid"></div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ Edit Note</h3>
    <input type="text" id="edit-title" placeholder="Title...">
    <textarea id="edit-body" rows="6" placeholder="Content..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const NOTES_KEY = 'journal_notes_v2';
let notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '[]');
let editingId = null;

function save() { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(ts) { return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

function previewFile() {
  const f = document.getElementById('note-file').files[0];
  const p = document.getElementById('note-file-name');
  if (f) { p.style.display='block'; p.textContent='📎 '+f.name; }
}

function addNote() {
  const title = document.getElementById('note-title').value.trim();
  const body = document.getElementById('note-body').value.trim();
  if (!title && !body) { alert('Please enter a title or content.'); return; }
  notes.unshift({id:Date.now(), title:title||'Untitled', body, ts:Date.now(), source:'typed'});
  save();
  document.getElementById('note-title').value='';
  document.getElementById('note-body').value='';
  renderNotes();
}

function importNote() {
  const file = document.getElementById('note-file').files[0];
  if (!file) { alert('Please select a file first using the upload area above.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const title = file.name.replace(/\.[^.]+$/,'');
    notes.unshift({id:Date.now(), title, body:e.target.result, ts:Date.now(), source:file.name});
    save();
    document.getElementById('note-file').value='';
    document.getElementById('note-file-name').style.display='none';
    renderNotes();
  };
  reader.readAsText(file);
}

function deleteNote(id) {
  if (!confirm('Delete this note permanently?')) return;
  notes = notes.filter(n=>n.id!==id);
  save(); renderNotes();
}

function openEdit(id) {
  const n = notes.find(n=>n.id===id);
  if (!n) return;
  editingId = id;
  document.getElementById('edit-title').value = n.title;
  document.getElementById('edit-body').value = n.body;
  document.getElementById('edit-modal').classList.add('active');
}

function saveEdit() {
  const n = notes.find(n=>n.id===editingId);
  if (!n) return;
  n.title = document.getElementById('edit-title').value.trim()||'Untitled';
  n.body = document.getElementById('edit-body').value.trim();
  n.ts = Date.now();
  save(); closeModal(); renderNotes();
}

function closeModal() { document.getElementById('edit-modal').classList.remove('active'); editingId=null; }

function toggleExpand(id) {
  const el = document.getElementById('body-'+id);
  const btn = document.getElementById('exp-'+id);
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? '↕ Less' : '↕ More';
}

function renderNotes() {
  const q = document.getElementById('search-notes').value.toLowerCase();
  const filtered = notes.filter(n=>n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q));
  document.getElementById('notes-count').textContent = notes.length;
  const grid = document.getElementById('notes-grid');
  if (filtered.length===0) {
    grid.innerHTML=`<div class="empty-state"><div class="ei">🗒️</div>${q?'No notes match your search.':'No notes yet.<br>Add your first note above or import a file.'}</div>`;
    return;
  }
  grid.innerHTML = filtered.map(n=>`
    <div class="note-card">
      <div class="note-actions">
        <button class="btn-icon exp" id="exp-${n.id}" onclick="toggleExpand(${n.id})">↕ More</button>
        <button class="btn-icon edt" onclick="openEdit(${n.id})">✏️</button>
        <button class="btn-icon del" onclick="deleteNote(${n.id})">🗑️</button>
      </div>
      <div class="note-title">${escHtml(n.title)}</div>
      <div class="note-body" id="body-${n.id}">${escHtml(n.body)}</div>
      <div class="note-date">🕒 ${formatDate(n.ts)}</div>
      ${n.source&&n.source!=='typed'?`<div class="note-source">📁 Imported: ${escHtml(n.source)}</div>`:''}
    </div>
  `).join('');
}

document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
renderNotes();
</script>
