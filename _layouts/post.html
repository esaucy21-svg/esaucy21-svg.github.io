---
layout: default
---

<article>
  <header style="background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460); padding: 3rem 2rem; text-align: center; color: white; margin-bottom: 3rem; border-bottom: 3px solid #e94560;">
    <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">{{ page.title }}</h1>
    <p style="opacity: 0.6; font-size: 0.95rem; letter-spacing: 1px;">{{ page.date | date: "%B %d, %Y" }}</p>
    <a href="/" style="display: inline-block; margin-top: 1.2rem; color: #e94560; font-size: 0.9rem; text-decoration: none; border: 1px solid #e94560; padding: 0.4rem 1rem; border-radius: 20px;">← Back to Journal</a>
  </header>

  <div style="max-width: 680px; margin: 0 auto; padding: 0 2rem 4rem; font-size: 1.15rem; line-height: 1.9; color: #ccc;">
    {{ content }}
  </div>

  <footer style="text-align: center; padding: 2rem; border-top: 1px solid #333; color: #666; font-size: 0.85rem;">
    My Attachment Journal &mdash; written with heart 🌙
  </footer>
</article>
