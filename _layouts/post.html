---
layout: default
---

<article>
  <header style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 3rem 2rem; text-align: center; color: white; margin-bottom: 3rem; border-bottom: 3px solid #a78bfa;">
    <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem; color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.5);">{{ page.title }}</h1>
    <p style="color: #c4b5fd; font-size: 0.95rem; letter-spacing: 1px;">{{ page.date | date: "%B %d, %Y" }}</p>
    <a href="/" style="display: inline-block; margin-top: 1.2rem; color: #ffffff; font-size: 0.9rem; text-decoration: none; background: #7c3aed; padding: 0.5rem 1.2rem; border-radius: 20px;">← Back to Journal</a>
  </header>

  <div style="max-width: 680px; margin: 0 auto; padding: 0 2rem 4rem; font-size: 1.15rem; line-height: 1.9; color: #1a1a1a;">
    {{ content }}
  </div>

  <footer style="text-align: center; padding: 2rem; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 0.85rem;">
    My Attachment Journal &mdash; written with heart 🌙
  </footer>
</article>---
