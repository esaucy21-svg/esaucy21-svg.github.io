---
layout: default
---

<article>
  <header style="background: linear-gradient(120deg, #155799, #159957); padding: 2rem; text-align: center; color: white; margin-bottom: 2rem;">
    <h1>{{ page.title }}</h1>
    <p style="opacity: 0.8;">{{ page.date | date: "%B %d, %Y" }}</p>
    <a href="/" style="color: white; opacity: 0.8; font-size: 0.9rem;">← Back to all posts</a>
  </header>
  <div style="max-width: 700px; margin: 0 auto; padding: 0 2rem; font-size: 1.1rem; line-height: 1.8;">
    {{ content }}
  </div>
</article>
