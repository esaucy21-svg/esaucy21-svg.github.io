<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jekyll-theme-slate@0.2.0/assets/css/style.css">
  </head>
  <body>
    <section class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
      <nav>
        <a href="{{ '/' | relative_url }}" class="btn">Home</a>
        <a href="{{ '/posts/' | relative_url }}" class="btn">Posts</a>
        <a href="{{ '/photos/' | relative_url }}" class="btn">Photos</a>
        <a href="{{ '/about/' | relative_url }}" class="btn">About</a>
      </nav>
    </section>
    <section class="main-content">
      {{ content }}
      <footer class="site-footer">
        <span class="site-footer-credits">{{ site.title }} &mdash; written with heart 🌙</span>
      </footer>
    </section>
  </body>
</html>
