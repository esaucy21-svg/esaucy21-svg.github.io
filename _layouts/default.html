<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Segoe UI", Arial, sans-serif; background: #1a1a2e; color: #eee; }

      /* NAV */
      .top-nav {
        background: #0d0d1a;
        padding: 10px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        border-bottom: 1px solid #333;
      }
      .top-nav a {
        color: #7fdbff;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 4px;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .top-nav a:hover { background: #222244; }

      /* HAMBURGER for mobile */
      .nav-toggle {
        display: none;
        background: none;
        border: 1px solid #7fdbff;
        color: #7fdbff;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      .nav-links { display: flex; flex-wrap: wrap; gap: 8px; }

      /* HEADER */
      .page-header {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        padding: 36px 20px 28px;
        text-align: center;
      }
      .page-header h1 {
        font-size: clamp(1.4rem, 5vw, 2.2rem);
        color: #fff;
        margin-bottom: 10px;
      }
      .page-header p {
        color: #c4b5fd;
        font-size: clamp(0.8rem, 3vw, 0.95rem);
        padding: 0 10px;
      }

      /* CONTENT */
      .main-content {
        max-width: 780px;
        margin: 0 auto;
        padding: 28px 16px;
        color: #ffffff;
        line-height: 1.8;
        word-wrap: break-word;
        overflow-x: hidden;
      }
      .main-content h1, .main-content h2, .main-content h3 {
        color: #fff;
        margin-bottom: 14px;
        font-size: clamp(1rem, 4vw, 1.5rem);
      }
      .main-content p { margin-bottom: 12px; font-size: clamp(0.85rem, 3vw, 1rem); }
      .main-content a { color: #7fdbff; }
      .main-content ul, .main-content ol { padding-left: 20px; }
      .main-content li { margin-bottom: 8px; font-size: clamp(0.85rem, 3vw, 1rem); }

      /* IMAGES */
      .main-content img { max-width: 100%; height: auto; border-radius: 6px; }

      /* TABLES */
      .main-content table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        font-size: 0.82rem;
      }
      .main-content th, .main-content td {
        padding: 8px 10px;
        border: 1px solid #333;
        text-align: left;
        white-space: nowrap;
      }

      /* CODE BLOCKS */
      .main-content pre {
        background: #0f0f1e;
        border-radius: 6px;
        padding: 14px;
        overflow-x: auto;
        font-size: 0.82rem;
        -webkit-overflow-scrolling: touch;
        border: 1px solid #2a2a4a;
      }
      .main-content code {
        font-size: 0.85rem;
        background: #1e1e3a;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .main-content pre code { background: none; padding: 0; }

      /* PHOTO GRID */
      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
      }

      /* FOOTER */
      .site-footer {
        text-align: center;
        padding: 20px 16px;
        color: #666;
        font-size: 0.8rem;
        border-top: 1px solid #333;
        margin-top: 40px;
      }

      /* MOBILE BREAKPOINT */
      @media (max-width: 600px) {
        .nav-toggle { display: block; }
        .nav-links { display: none; width: 100%; flex-direction: column; }
        .nav-links.open { display: flex; }
        .nav-links a { width: 100%; padding: 10px 12px; border-bottom: 1px solid #1e1e3a; }

        .page-header { padding: 24px 16px 20px; }

        .main-content { padding: 20px 14px; }

        /* Stack any side-by-side grids */
        div[style*="grid-template-columns"] {
          grid-template-columns: 1fr !important;
        }
      }

      @media (max-width: 400px) {
        .top-nav { padding: 8px 12px; }
        .page-header h1 { font-size: 1.3rem; }
      }
    </style>
  </head>
  <body>

    <nav class="top-nav">
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰ Menu</button>
      <div class="nav-links" id="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/posts/' | relative_url }}">Posts</a>
        <a href="{{ '/photos/' | relative_url }}">Photos</a>
        <a href="{{ '/notes/' | relative_url }}">My Notes</a>
        <a href="{{ '/reports/' | relative_url }}">My Reports</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </div>
    </nav>

    <div class="page-header">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </div>

    <section class="main-content">
      {{ content }}
    </section>

    <footer class="site-footer">
      {{ site.title }} &mdash; written with heart 🌙
    </footer>

    <script>
      function toggleNav() {
        document.getElementById('nav-links').classList.toggle('open');
      }
      // Close nav when a link is clicked on mobile
      document.querySelectorAll('.nav-links a').forEach(function(link) {
        link.addEventListener('click', function() {
          document.getElementById('nav-links').classList.remove('open');
        });
      });
    </script>

  </body>
</html>
